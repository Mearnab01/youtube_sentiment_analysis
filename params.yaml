# Project Control Center

data_ingestion:
  test_size: 0.20
  raw_data_path: "data/raw"

data_preprocessing:
  # Any specific preprocessing flags go here
  drop_na: True

model_building:
  ngram_range: [1, 3]
  max_features: 10000 # Back to 10k for accuracy
  learning_rate: 0.034
  max_depth: 15
  n_estimators: 449
  num_leaves: 140
  reg_alpha: 1.95
  reg_lambda: 0.002

model_evaluation:
  metrics_file: "experiment_info.json"
