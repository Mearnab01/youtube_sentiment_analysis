stages:
  data_ingestion:
    cmd: python src/youtube/components/data_ingestion.py
    deps:
      - src/youtube/components/data_ingestion.py
    params:
      - data_ingestion.test_size
    outs:
      - data/raw

  data_preprocessing:
    cmd: python src/youtube/components/data_preprocessing.py
    deps:
      - data/raw
      - src/youtube/components/data_preprocessing.py
    outs:
      - data/interim

  model_building:
    cmd: python src/youtube/components/model_building.py
    deps:
      - data/interim
      - src/youtube/components/model_building.py
    params:
      - model_building.max_features
      - model_building.ngram_range
      - model_building.learning_rate
      - model_building.max_depth
      - model_building.n_estimators
    outs:
      - lgbm_model.pkl
      - tfidf_vectorizer.pkl

  model_evaluation:
    cmd: python src/youtube/components/model_evaluation.py
    deps:
      - lgbm_model.pkl
      - tfidf_vectorizer.pkl
      - data/interim
      - src/youtube/components/model_evaluation.py
    metrics:
      - experiment_info.json:
          cache: false
