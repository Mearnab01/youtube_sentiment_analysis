stages:
  data_ingestion:
    cmd: python -m src.data.data_ingestion
    deps:
      - src/data/data_ingestion.py
      - params.yaml
    params:
      - data_ingestion.test_size
    outs:
      - data/raw

  data_preprocessing:
    cmd: python -m src.data.data_preprocessing
    deps:
      - src/data/data_preprocessing.py
      - data/raw
    outs:
      - data/interim

  model_building:
    cmd: python -m src.model.model_building
    deps:
      - src/model/model_building.py
      - data/interim
      - params.yaml
    outs:
      - models/lgbm_model.pkl
      - models/tfidf_vectorizer.pkl

  model_evaluation:
    cmd: python -m src.model.model_evaluation
    deps:
      - src/model/model_evaluation.py
      - models/lgbm_model.pkl
      - models/tfidf_vectorizer.pkl
      - data/interim
    outs:
      - artifacts/classification_report.json
      - artifacts/confusion_matrix.png
      - artifacts/experiment_info.json
